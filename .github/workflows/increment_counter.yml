name: Increment Counter

on:
     repository_dispatch:
       types: [run-widget-update]

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Increment counter
        run: |
          FILE="counter.json"
          if [ ! -f "$FILE" ]; then
            echo '{"total": 0}' > "$FILE"
          fi

          CURRENT=$(node -p "require('./$FILE').total")
          RAND=$(( (RANDOM % 10) + 1 ))
          NEW_TOTAL=$((CURRENT + RAND))

          echo "{\"total\": $NEW_TOTAL, \"lastAdded\": $RAND, \"updatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add counter.json
          git commit -m "Increment counter" || echo "No changes to commit"
          git push
